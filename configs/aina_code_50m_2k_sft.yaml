project_name: aina-1-code-50m-2k-sft
stage: sft
dataset_dir: /data/aina-code/datasets/aina-1-code-50m-2k/sft
s3_dataset: s3://aina-code-532101712983-us-east-2-an/v1/datasets/aina-1-code-50m-2k/sft/
tokenizer_path: /data/aina-code/datasets/aina-1-code-50m-2k/pretrain/tokenizer
init_checkpoint: /data/aina-code/training/aina-1-code-50m-2k/pretrain/checkpoint-latest.pt
init_s3_output: s3://aina-code-532101712983-us-east-2-an/v1/training/aina-1-code-50m-2k/pretrain/
output_dir: /data/aina-code/training/aina-1-code-50m-2k/sft
s3_output: s3://aina-code-532101712983-us-east-2-an/v1/training/aina-1-code-50m-2k/sft/
seed: 42
batch_size: 8
grad_accum_steps: 8
max_steps: 3000
eval_interval: 250
eval_batches: 20
checkpoint_interval: 250
log_interval: 10
device: auto
dtype: auto
compile: false
sft_max_length: 2048
sft_assistant_only_loss: true

model:
  name: aina-1-code-50m-2k
  architecture: llama
  sequence_length: 2048
  hidden_size: 512
  intermediate_size: 1376
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  dropout: 0.0
  attention_dropout: 0.0
  tie_word_embeddings: true

optimizer:
  learning_rate: 0.0002
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 200
  min_learning_rate: 0.00002
