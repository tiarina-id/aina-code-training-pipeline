project_name: aina-code-50m-sft
stage: sft
dataset_dir: /data/aina-dataset/sft/aina-code-50m-instruct-v1
s3_dataset: s3://aina-code-datasets/v1/sft/aina-code-50m-instruct-v1/
tokenizer_path: /data/aina-dataset/pretrain/aina-code-50m-1b/tokenizer
init_checkpoint: /data/aina-training/pretrain/aina-code-50m/checkpoint-latest.pt
init_s3_output: s3://aina-code-datasets/v1/training/pretrain/aina-code-50m/
output_dir: /data/aina-training/sft/aina-code-50m
s3_output: s3://aina-code-datasets/v1/training/sft/aina-code-50m/
seed: 42
batch_size: 8
grad_accum_steps: 8
max_steps: 3000
eval_interval: 250
eval_batches: 20
checkpoint_interval: 250
log_interval: 10
device: auto
dtype: auto
compile: false
sft_max_length: 2048
sft_assistant_only_loss: true

model:
  name: aina-code-50m
  architecture: llama
  sequence_length: 2048
  hidden_size: 512
  intermediate_size: 1376
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  dropout: 0.0
  attention_dropout: 0.0
  tie_word_embeddings: true

optimizer:
  learning_rate: 0.0002
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 200
  min_learning_rate: 0.00002
