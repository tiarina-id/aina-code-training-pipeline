project_name: aina-1-code-0.5b-8k-sft
stage: sft
dataset_dir: /data/aina-code/datasets/aina-1-code-0.5b-8k/sft
s3_dataset: s3://aina-code/v1/datasets/aina-1-code-0.5b-8k/sft/
tokenizer_path: /data/aina-code/datasets/aina-1-code-0.5b-8k/pretrain/tokenizer
init_checkpoint: /data/aina-code/training/aina-1-code-0.5b-8k/pretrain/checkpoint-latest.pt
init_s3_output: s3://aina-code/v1/training/aina-1-code-0.5b-8k/pretrain/
output_dir: /data/aina-code/training/aina-1-code-0.5b-8k/sft
s3_output: s3://aina-code/v1/training/aina-1-code-0.5b-8k/sft/
seed: 42
batch_size: 1
grad_accum_steps: 32
max_steps: 10000
eval_interval: 500
eval_batches: 20
checkpoint_interval: 500
log_interval: 10
device: auto
dtype: auto
compile: false
sft_max_length: 8192
sft_assistant_only_loss: true

model:
  name: aina-1-code-0.5b-8k
  architecture: llama
  sequence_length: 8192
  hidden_size: 1280
  intermediate_size: 3456
  num_hidden_layers: 24
  num_attention_heads: 20
  num_key_value_heads: 20
  dropout: 0.0
  attention_dropout: 0.0
  tie_word_embeddings: true

optimizer:
  learning_rate: 0.0001
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 500
  min_learning_rate: 0.00001
