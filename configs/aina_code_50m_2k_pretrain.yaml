project_name: aina-1-code-50m-2k-pretrain
stage: pretrain
dataset_dir: /data/aina-code/datasets/aina-1-code-50m-2k/pretrain
s3_dataset: s3://aina-code-532101712983-us-east-2-an/v1/datasets/aina-1-code-50m-2k/pretrain/
tokenizer_path: /data/aina-code/datasets/aina-1-code-50m-2k/pretrain/tokenizer
output_dir: /data/aina-code/training/aina-1-code-50m-2k/pretrain
s3_output: s3://aina-code-532101712983-us-east-2-an/v1/training/aina-1-code-50m-2k/pretrain/
seed: 42
batch_size: 16
grad_accum_steps: 8
max_steps: 10000
eval_interval: 500
eval_batches: 20
checkpoint_interval: 500
log_interval: 10
device: auto
dtype: auto
compile: false

model:
  name: aina-1-code-50m-2k
  architecture: llama
  sequence_length: 2048
  hidden_size: 512
  intermediate_size: 1376
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  dropout: 0.0
  attention_dropout: 0.0
  tie_word_embeddings: true

optimizer:
  learning_rate: 0.0006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 500
  min_learning_rate: 0.00006
