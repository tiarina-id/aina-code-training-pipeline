project_name: aina-code-500m-pretrain
stage: pretrain
dataset_dir: /data/aina-dataset/pretrain/aina-code-500m-10b
s3_dataset: s3://aina-code-datasets/v1/pretrain/aina-code-500m-10b/
tokenizer_path: /data/aina-dataset/pretrain/aina-code-500m-10b/tokenizer
output_dir: /data/aina-training/pretrain/aina-code-500m
s3_output: s3://aina-code-datasets/v1/training/pretrain/aina-code-500m/
seed: 42
batch_size: 4
grad_accum_steps: 32
max_steps: 50000
eval_interval: 1000
eval_batches: 20
checkpoint_interval: 1000
log_interval: 10
device: auto
dtype: auto
compile: false

model:
  name: aina-code-500m
  architecture: llama
  sequence_length: 2048
  hidden_size: 1280
  intermediate_size: 3456
  num_hidden_layers: 24
  num_attention_heads: 20
  num_key_value_heads: 20
  dropout: 0.0
  attention_dropout: 0.0
  tie_word_embeddings: true

optimizer:
  learning_rate: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 2000
  min_learning_rate: 0.00003
