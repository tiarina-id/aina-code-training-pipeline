project_name: aina-code-3m-local-pretrain
stage: pretrain
dataset_dir: /tmp/aina-code-datasets/pretrain/aina-code-3m-local-18m
s3_dataset: s3://aina-code-datasets/v1/pretrain/aina-code-3m-local-18m/
tokenizer_path: /tmp/aina-code-datasets/pretrain/aina-code-3m-local-18m/tokenizer
output_dir: /tmp/aina-code-training/pretrain/aina-code-3m-local
s3_output: s3://aina-code-datasets/v1/training/pretrain/aina-code-3m-local/
seed: 42
batch_size: 2
grad_accum_steps: 1
max_steps: 20
eval_interval: 5
eval_batches: 2
checkpoint_interval: 10
log_interval: 1
device: auto
dtype: auto
compile: false

model:
  name: aina-code-3m
  architecture: llama
  sequence_length: 2048
  hidden_size: 64
  intermediate_size: 256
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 4
  dropout: 0.0
  attention_dropout: 0.0
  tie_word_embeddings: true

optimizer:
  learning_rate: 0.0006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 5
  min_learning_rate: 0.00006
