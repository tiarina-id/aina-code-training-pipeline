project_name: aina-code-3m-local-sft
stage: sft
dataset_dir: /tmp/aina-code-datasets/sft/aina-code-3m-local-instruct-v1
s3_dataset: s3://aina-code-datasets/v1/sft/aina-code-3m-local-instruct-v1/
tokenizer_path: /tmp/aina-code-datasets/pretrain/aina-code-3m-local-18m/tokenizer
init_checkpoint: /tmp/aina-code-training/pretrain/aina-code-3m-local/checkpoint-latest.pt
init_s3_output: s3://aina-code-datasets/v1/training/pretrain/aina-code-3m-local/
output_dir: /tmp/aina-code-training/sft/aina-code-3m-local
s3_output: s3://aina-code-datasets/v1/training/sft/aina-code-3m-local/
seed: 42
batch_size: 2
grad_accum_steps: 1
max_steps: 20
eval_interval: 5
eval_batches: 2
checkpoint_interval: 10
log_interval: 1
device: auto
dtype: auto
compile: false
sft_max_length: 2048
sft_assistant_only_loss: true

model:
  name: aina-code-3m
  architecture: llama
  sequence_length: 2048
  hidden_size: 64
  intermediate_size: 256
  num_hidden_layers: 6
  num_attention_heads: 4
  num_key_value_heads: 4
  dropout: 0.0
  attention_dropout: 0.0
  tie_word_embeddings: true

optimizer:
  learning_rate: 0.0002
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 5
  min_learning_rate: 0.00002
