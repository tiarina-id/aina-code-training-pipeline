project_name: aina-code-50m-pretrain
stage: pretrain
dataset_dir: /data/aina-dataset/pretrain/aina-code-50m-1b
s3_dataset: s3://aina-code-datasets/v1/pretrain/aina-code-50m-1b/
tokenizer_path: /data/aina-dataset/pretrain/aina-code-50m-1b/tokenizer
output_dir: /data/aina-training/pretrain/aina-code-50m
s3_output: s3://aina-code-datasets/v1/training/pretrain/aina-code-50m/
seed: 42
batch_size: 32
grad_accum_steps: 4
max_steps: 10000
eval_interval: 500
eval_batches: 20
checkpoint_interval: 500
log_interval: 10
device: auto
dtype: auto
compile: false

model:
  name: aina-code-50m
  architecture: llama
  sequence_length: 2048
  hidden_size: 512
  intermediate_size: 1376
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
  dropout: 0.0
  attention_dropout: 0.0
  tie_word_embeddings: true

optimizer:
  learning_rate: 0.0006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 500
  min_learning_rate: 0.00006
